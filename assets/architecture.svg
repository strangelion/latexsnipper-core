<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gPlatform" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="gAdapter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="gCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="gRuntime" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Platform Layer -->
  <rect x="40" y="20" width="720" height="70" rx="8" fill="url(#gPlatform)" filter="url(#shadow)"/>
  <text x="400" y="48" text-anchor="middle" fill="white" font-size="13" font-weight="600">Platform Layer</text>
  <text x="140" y="70" text-anchor="middle" fill="#cbd5e1" font-size="11">Android</text>
  <text x="300" y="70" text-anchor="middle" fill="#cbd5e1" font-size="11">Office</text>
  <text x="460" y="70" text-anchor="middle" fill="#cbd5e1" font-size="11">Browser</text>
  <text x="620" y="70" text-anchor="middle" fill="#cbd5e1" font-size="11">Desktop</text>

  <!-- Arrow -->
  <line x1="400" y1="90" x2="400" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Adapter Layer -->
  <rect x="40" y="110" width="720" height="70" rx="8" fill="url(#gAdapter)" filter="url(#shadow)"/>
  <text x="400" y="138" text-anchor="middle" fill="white" font-size="13" font-weight="600">Adapter Layer</text>
  <text x="140" y="160" text-anchor="middle" fill="#bae6fd" font-size="11">JNI</text>
  <text x="300" y="160" text-anchor="middle" fill="#bae6fd" font-size="11">WASM</text>
  <text x="460" y="160" text-anchor="middle" fill="#bae6fd" font-size="11">Office.js</text>
  <text x="620" y="160" text-anchor="middle" fill="#bae6fd" font-size="11">CLI</text>

  <!-- Arrow -->
  <line x1="400" y1="180" x2="400" y2="200" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0ea5e9"/></marker></defs>

  <!-- Core Layer -->
  <rect x="40" y="200" width="720" height="120" rx="8" fill="url(#gCore)" filter="url(#shadow)"/>
  <text x="400" y="225" text-anchor="middle" fill="white" font-size="13" font-weight="600">Core Layer — LaTeXSnipper Engine</text>

  <!-- Core modules -->
  <rect x="60" y="240" width="90" height="30" rx="4" fill="#14b8a6" opacity="0.8"/>
  <text x="105" y="259" text-anchor="middle" fill="white" font-size="10">AST</text>

  <rect x="165" y="240" width="90" height="30" rx="4" fill="#14b8a6" opacity="0.8"/>
  <text x="210" y="259" text-anchor="middle" fill="white" font-size="10">Inference</text>

  <rect x="270" y="240" width="90" height="30" rx="4" fill="#14b8a6" opacity="0.8"/>
  <text x="315" y="259" text-anchor="middle" fill="white" font-size="10">Pipeline</text>

  <rect x="375" y="240" width="90" height="30" rx="4" fill="#14b8a6" opacity="0.8"/>
  <text x="420" y="259" text-anchor="middle" fill="white" font-size="10">Conversion</text>

  <rect x="480" y="240" width="90" height="30" rx="4" fill="#14b8a6" opacity="0.8"/>
  <text x="525" y="259" text-anchor="middle" fill="white" font-size="10">Export</text>

  <rect x="585" y="240" width="90" height="30" rx="4" fill="#14b8a6" opacity="0.8"/>
  <text x="630" y="259" text-anchor="middle" fill="white" font-size="10">Model</text>

  <rect x="690" y="240" width="50" height="30" rx="4" fill="#14b8a6" opacity="0.8"/>
  <text x="715" y="259" text-anchor="middle" fill="white" font-size="10">Syntax</text>

  <!-- Core bottom row -->
  <rect x="60" y="280" width="110" height="30" rx="4" fill="#0d9488" opacity="0.9"/>
  <text x="115" y="299" text-anchor="middle" fill="white" font-size="10">Image</text>

  <rect x="185" y="280" width="110" height="30" rx="4" fill="#0d9488" opacity="0.9"/>
  <text x="240" y="299" text-anchor="middle" fill="white" font-size="10">Plugin</text>

  <rect x="310" y="280" width="110" height="30" rx="4" fill="#0d9488" opacity="0.9"/>
  <text x="365" y="299" text-anchor="middle" fill="white" font-size="10">Foundation</text>

  <!-- Arrow -->
  <line x1="400" y1="320" x2="400" y2="340" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <defs><marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0d9488"/></marker></defs>

  <!-- Runtime Layer -->
  <rect x="40" y="340" width="720" height="60" rx="8" fill="url(#gRuntime)" filter="url(#shadow)"/>
  <text x="400" y="365" text-anchor="middle" fill="white" font-size="13" font-weight="600">Runtime Layer</text>
  <text x="160" y="385" text-anchor="middle" fill="#ddd6fe" font-size="11">ONNX Runtime</text>
  <text x="340" y="385" text-anchor="middle" fill="#ddd6fe" font-size="11">Stub</text>
  <text x="500" y="385" text-anchor="middle" fill="#ddd6fe" font-size="11">TensorRT</text>
  <text x="660" y="385" text-anchor="middle" fill="#ddd6fe" font-size="11">Future ...</text>
</svg>
